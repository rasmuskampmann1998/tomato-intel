name: Weekly Digest

on:
  schedule:
    - cron: '30 7 * * 1'   # Every Monday 07:30 UTC (after scrape-weekly.yml at 07:00)
  workflow_dispatch:
    inputs:
      email:
        description: 'Send digest to this email (optional, needs SENDGRID_API_KEY secret)'
        required: false
        default: ''

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: market-intelligence
        run: pip install -r requirements.txt

      - name: Generate weekly digest
        working-directory: market-intelligence
        run: |
          EMAIL_ARG=""
          if [ -n "${{ github.event.inputs.email }}" ]; then
            EMAIL_ARG="--email ${{ github.event.inputs.email }}"
          fi
          python processors/weekly_digest.py $EMAIL_ARG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
