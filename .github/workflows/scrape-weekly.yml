name: Scrape Weekly (Competitors + Regulations + Crops)

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: market-intelligence
        run: pip install -r requirements.txt

      - name: Scrape competitors
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories competitors
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

      - name: Scrape regulations
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories regulations
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

      - name: Scrape crop recommendations
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories crops
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

      - name: Scrape genetics
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories genetics
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

      - name: Scrape patents
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories patents
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EPO_CLIENT_ID: ${{ secrets.EPO_CLIENT_ID }}
          EPO_CLIENT_SECRET: ${{ secrets.EPO_CLIENT_SECRET }}

      - name: Run Claude interpreter
        working-directory: market-intelligence
        run: python processors/claude_interpreter.py --limit 300
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Score profiles
        working-directory: market-intelligence
        run: python processors/profile_scorer.py --hours 168
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
