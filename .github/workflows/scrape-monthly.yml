name: Scrape Monthly (Patents + Genetics)

on:
  schedule:
    - cron: '0 7 1 * *'   # 1st of every month, 07:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: market-intelligence
        run: pip install -r requirements.txt

      - name: Scrape patents (USPTO + EPO + CNIPA + IP India)
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories patents
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          EPO_CLIENT_ID: ${{ secrets.EPO_CLIENT_ID }}
          EPO_CLIENT_SECRET: ${{ secrets.EPO_CLIENT_SECRET }}

      - name: Scrape genetics sources
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories genetics
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

      - name: Run Claude interpreter
        working-directory: market-intelligence
        run: python processors/claude_interpreter.py --limit 200
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
