name: Scrape Daily (News + Social)

on:
  schedule:
    - cron: '0 6 * * 1-5'   # Mon–Fri 06:00 UTC
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: market-intelligence
        run: pip install -r requirements.txt

      - name: Scrape news sources
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories news
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

      - name: Scrape social media
        working-directory: market-intelligence
        run: python scrapers/run_scrapers.py --categories social
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: TomatoIntelBot/1.0

      - name: Run Claude interpreter
        working-directory: market-intelligence
        run: python processors/claude_interpreter.py --limit 100
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
